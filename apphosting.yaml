# Firebase App Hosting configuration file

kind: AppHostingConfiguration
schemaVersion: v1

# The build settings for the Next.js application
buildSettings:
  # The directory containing the Next.js application (root in this case)
  # appRoot: .

  # Specify the Node.js version to use
  nodeVersion: 20

# Environment variables that should be available during build and runtime
env:
  - variable: NEXT_PUBLIC_GEMINI_LIVE_MODEL
    value: gemini-2.5-flash-native-audio-preview-12-2025 # Or your preferred model
  - variable: NEXT_PUBLIC_RELAY_WS_URL
    # This will be populated with the Cloud Run URL after deployment
    # For now, it's a placeholder or the user can set it in Firebase Console
    value: ""
