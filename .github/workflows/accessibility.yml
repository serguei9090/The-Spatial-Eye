name: Accessibility Check

on:
  push:
    branches: 
      - main
  pull_request:
    branches: 
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Accessibility Tests
        run: bun run test:a11y
